<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<link rel="stylesheet" href="4200.css">

<style>
    .lang-switcher {
        text-align: center;
        padding: 15px;
        background-color: #f5f5f5;
    }

    .lang-switcher a {
        display: inline-block;
        margin: 0 10px;
        padding: 8px 15px;
        background-color: #2e8b57;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background-color 0.3s;
    }

    .lang-switcher a:hover {
        background-color: #246b45;
    }

    .lang-switcher a.active {
        background-color: #25D366;
    }
</style>

</head>

<body>

<div class="lang-switcher">
    <a href="login.html" class="active">العربية</a>
    <a href="login-en.html">English</a>
</div>

<header>
    <h1>منصة الأسر المنتجة</h1>
    <p>تسجيل الدخول</p>
    <div class="back-icon" onclick="goBack()">←</div>
</header>

<div class="login-container">
    <div class="login-box">
        <h2>تسجيل الدخول</h2>

        <input type="text" placeholder="اسم المستخدم" id="username">
        <input type="password" placeholder="كلمة المرور" id="password">

        <button onclick="login()">دخول</button>

        <p id="message"></p>
    </div>
</div>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        window.location.href = "index.html"; // يرجع للرئيسية
    } else {
        document.getElementById("message").innerHTML = "بيانات غير صحيحة";
    }
}
   

function goBack() {
    window.location.href = "index.html";
}

   

</script>

</body>
</html>
