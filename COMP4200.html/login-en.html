<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In</title>

<link rel="stylesheet" href="4200.css">

<style>
    body {
        direction: ltr;
    }

    header {
        direction: ltr;
        text-align: center;
    }

    .lang-switcher {
        text-align: center;
        padding: 15px;
        background-color: #f5f5f5;
    }

    .lang-switcher a {
        display: inline-block;
        margin: 0 10px;
        padding: 8px 15px;
        background-color: #2e8b57;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background-color 0.3s;
    }

    .lang-switcher a:hover {
        background-color: #246b45;
    }

    .lang-switcher a.active {
        background-color: #25D366;
    }

    .back-icon {
        position: absolute;
        left: 20px;
        top: 70px;
        font-size: 28px;
        cursor: pointer;
        background-color: white;
        color: #2e8b57;
        padding: 10px 14px;
        border-radius: 50%;
        box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        transition: 0.3s;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
    }

    .back-icon:hover {
        background-color: #2e8b57;
        color: white;
    }
</style>

</head>

<body>

<div class="lang-switcher">
    <a href="login.html">العربية</a>
    <a href="login-en.html" class="active">English</a>
</div>

<header>
    <h1>Productive Families Platform</h1>
    <p>Sign In</p>
    <div class="back-icon" onclick="goBack()">→</div>
</header>

<div class="login-container">
    <div class="login-box">
        <h2>Sign In</h2>

        <input type="text" placeholder="Username" id="username">
        <input type="password" placeholder="Password" id="password">

        <button onclick="login()">Sign In</button>

        <p id="message"></p>
    </div>
</div>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "admin" && pass === "1234") {
        window.location.href = "index-en.html";
    } else {
        document.getElementById("message").innerHTML = "Invalid credentials";
    }
}

function goBack() {
    window.location.href = "index-en.html";
}

</script>

</body>
</html>
